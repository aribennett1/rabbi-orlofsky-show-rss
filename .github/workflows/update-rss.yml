name: Update RSS Feed

on:
  schedule:
    # 9:01 AM EST (14:01 UTC). During EDT this runs at 10:01 AM Eastern.
    - cron: '1 14 * * *'
  workflow_dispatch:

concurrency:
  group: update-rss
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Merge recent Squarespace episodes into feed
        run: node scripts/merge-feed.js

      - name: Commit and push if changed
        run: |
          if git diff --quiet rss-feed.xml; then
            echo "No feed changes"
            exit 0
          fi
          git add rss-feed.xml
          git commit -m "Update RSS feed from Squarespace JSON."
          git push
