name: Update RSS Feed

on:
  schedule:
    # 9:02 AM Eastern year-round (GitHub cron is UTC-only; guard step picks the right run).
    - cron: '2 13 * * *'
    - cron: '2 14 * * *'
  workflow_dispatch:

concurrency:
  group: update-rss
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Should run
        id: should_run
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/New_York date +%H)
          if [ "$HOUR" = "09" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 9 AM Eastern, skipping scheduled run."
          fi

      - uses: actions/checkout@v6
        if: steps.should_run.outputs.run == 'true'

      - uses: actions/setup-node@v6
        if: steps.should_run.outputs.run == 'true'
        with:
          node-version: '20'

      - name: Merge recent Squarespace episodes into feed
        if: steps.should_run.outputs.run == 'true'
        run: node scripts/merge-feed.js

      - name: Commit and push if changed
        if: steps.should_run.outputs.run == 'true'
        run: |
          changed=0
          for file in rss-feed.xml parsha-in-5.xml q-and-a.xml; do
            if ! git diff --quiet "$file"; then
              changed=1
            fi
          done
          if [ "$changed" -eq 0 ]; then
            echo "No feed changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rss-feed.xml parsha-in-5.xml q-and-a.xml
          git commit -m "Update RSS feeds from Squarespace JSON."
          git push
