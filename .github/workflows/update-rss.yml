name: Update RSS Feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Merge recent Squarespace episodes into feed
        run: node scripts/merge-feed.js

      - name: Commit and push if changed
        run: |
          changed=0
          for file in rss-feed.xml parsha-in-5.xml q-and-a.xml; do
            if ! git diff --quiet "$file"; then
              changed=1
            fi
          done
          if [ "$changed" -eq 0 ]; then
            echo "No feed changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rss-feed.xml parsha-in-5.xml q-and-a.xml
          git commit -m "Update RSS feeds from Squarespace JSON."
          git push
